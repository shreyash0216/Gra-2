services:
  # Backend Service
  - type: web
    name: gra-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

  # Frontend Service
  - type: static
    name: gra-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist

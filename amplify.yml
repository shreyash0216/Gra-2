version: 1
applications:
  - appRoot: frontend
    env:
      variables:
        VITE_API_URL: "https://backend.genresai.me"
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
      rewrites:
        - source: /api/<*>
          target: https://backend.genresai.me/<*>
          status: 200
